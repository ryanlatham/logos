name: Logos
options:
  bundleIdPrefix: com.ryan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
targets:
  Logos:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Logos
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryan.logos
        PRODUCT_NAME: Logos
        INFOPLIST_FILE: Logos/Info.plist
        CODE_SIGN_ENTITLEMENTS: Logos/Logos.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_TESTABILITY: YES
  LogosTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LogosTests
    dependencies:
      - target: Logos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryan.logos.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Logos.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Logos"
        BUNDLE_LOADER: "$(TEST_HOST)"
  LogosUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LogosUITests
    dependencies:
      - target: Logos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryan.logos.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Logos
schemes:
  Logos:
    build:
      targets:
        Logos: all
    test:
      targets:
        - LogosTests
        - LogosUITests
