# Logos pre-commit hooks. Install once with `pre-commit install`.
# Enforces the README "Contributor guardrails": never commit secrets, keys,
# databases, .env files, QR images, or generated Xcode projects.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        # Uses .gitleaks.toml at the repo root (fixture allowlist).

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: local
    hooks:
      - id: block-secret-files
        name: Block secrets/keys/databases/QR/xcodeproj from being committed
        entry: >-
          Refusing to commit a secret/key/database/.env/QR/xcodeproj artifact.
          Remove it from the commit (see README "Contributor guardrails").
        language: fail
        files: >-
          (?x)(
            \.p8$|
            \.pem$|
            \.key$|
            \.env$|
            \.env\..+|
            \.db$|
            \.sqlite3?$|
            .*qr.*\.png$|
            (^|/)Logos\.xcodeproj/
          )
